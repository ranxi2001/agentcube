apiVersion: apps/v1
kind: Deployment
metadata:
  name: day14-kwok-scheduler-smoke
  namespace: default
  labels:
    app: day14-kwok-scheduler-smoke
spec:
  replicas: 6
  selector:
    matchLabels:
      app: day14-kwok-scheduler-smoke
  template:
    metadata:
      labels:
        app: day14-kwok-scheduler-smoke
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: type
                    operator: In
                    values:
                      - kwok
      tolerations:
        - key: kwok.x-k8s.io/node
          operator: Exists
          effect: NoSchedule
      containers:
        - name: fake-container
          image: fake-image
