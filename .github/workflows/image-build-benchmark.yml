name: Image Build Benchmark

on:
  push:
    branches:
      - 'ci/image-build-*-benchmark'

permissions:
  contents: read

concurrency:
  group: image-build-benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  buildx-benchmark:
    name: buildx multi-arch benchmark
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Capture Docker environment
        run: |
          mkdir -p benchmark-logs
          {
            echo "branch=${GITHUB_REF_NAME}"
            echo "sha=${GITHUB_SHA}"
            echo "runner_os=${RUNNER_OS}"
            echo "runner_arch=${RUNNER_ARCH}"
            docker --version
            docker buildx version
            docker buildx ls
            docker buildx inspect --bootstrap
          } | tee benchmark-logs/environment.txt

      - name: Run buildx benchmark
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p benchmark-logs
          summary="benchmark-logs/summary.md"
          {
            echo "# Image build benchmark"
            echo
            echo "| Image | Dockerfile | Status | Elapsed seconds |"
            echo "| --- | --- | --- | ---: |"
          } > "${summary}"

          run_build() {
            local name="$1"
            local dockerfile="$2"
            local log="benchmark-logs/${name}.log"
            local start
            local end
            local elapsed
            local status

            echo "::group::${name}"
            {
              echo "name=${name}"
              echo "dockerfile=${dockerfile}"
              echo "start_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            } | tee "${log}"

            start="$(date +%s)"
            set +e
            /usr/bin/time -p docker buildx build \
              -f "${dockerfile}" \
              --platform linux/amd64,linux/arm64 \
              --progress=plain \
              . 2>&1 | tee -a "${log}"
            status="${PIPESTATUS[0]}"
            set -e
            end="$(date +%s)"
            elapsed=$((end - start))

            {
              echo "status=${status}"
              echo "end_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
              echo "elapsed_seconds=${elapsed}"
            } | tee -a "${log}"
            echo "| ${name} | \`${dockerfile}\` | ${status} | ${elapsed} |" >> "${summary}"
            echo "::endgroup::"

            if [[ "${status}" -ne 0 ]]; then
              exit "${status}"
            fi
          }

          run_build workloadmanager docker/Dockerfile
          run_build router docker/Dockerfile.router
          run_build picod docker/Dockerfile.picod

          cat "${summary}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload benchmark logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: image-build-benchmark-${{ github.run_id }}
          path: benchmark-logs/
          if-no-files-found: warn
